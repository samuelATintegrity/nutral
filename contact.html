<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Nūtral</title>
    <meta name="description" content="Get in touch with Nūtral." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%233A5A40'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='serif' font-size='40' font-weight='600' fill='%23F7F4EC' dominant-baseline='middle'%3EN%3C/text%3E%3C/svg%3E"
    />

    <style>
      :root {
        --bg: #f7f4ec;
        --bg-elev: #fcfaf3;
        --text: #1a1a1a;
        --text-muted: #5c5a55;
        --accent: #3a5a40;
        --accent-dark: #2c4631;
        --accent-soft: rgba(58, 90, 64, 0.08);
        --divider: #d9d3c4;
        --error: #9c2a2a;
        --serif: "DM Serif Text", "Iowan Old Style", Georgia, serif;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --max-w: 1100px;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 17px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
      a:hover { color: var(--accent-dark); }
      h1, h2, h3 {
        font-family: var(--serif);
        font-weight: 400;
        letter-spacing: -0.015em;
        line-height: 1.15;
        margin: 0;
      }
      p { margin: 0; }

      .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }

      .site-header { background: transparent; padding: 18px 0; }
      .nav { display: flex; justify-content: space-between; align-items: center; }
      .wordmark {
        font-family: var(--serif);
        font-weight: 400;
        font-size: 26px;
        letter-spacing: -0.02em;
        color: var(--text);
        text-decoration: none;
      }
      .nav-btn {
        padding: 9px 20px;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--text);
        border-radius: 999px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .nav-btn:hover { background: var(--text); color: var(--bg); }

      main { padding: 40px 0 96px; }
      .doc { max-width: 56ch; margin: 0 auto; }
      .doc .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        font-weight: 500;
        color: var(--accent);
        margin-bottom: 12px;
      }
      .doc h1 { font-size: clamp(36px, 5vw, 56px); margin-bottom: 16px; }
      .doc .lede { color: var(--text-muted); font-size: clamp(16px, 1.4vw, 18px); margin-bottom: 36px; }

      .card {
        background: var(--bg-elev);
        border: 1px solid var(--divider);
        border-radius: 12px;
        padding: 32px;
      }
      .field { margin-bottom: 18px; }
      .field:last-of-type { margin-bottom: 0; }
      label {
        display: block;
        font-family: var(--serif);
        font-size: 18px;
        font-weight: 400;
        color: var(--text);
        margin-bottom: 8px;
      }
      input[type="text"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 12px 18px;
        font-family: inherit;
        font-size: 15px;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--divider);
        border-radius: 12px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      input[type="text"],
      input[type="email"] {
        border-radius: 999px;
      }
      textarea {
        min-height: 160px;
        resize: vertical;
        line-height: 1.6;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      /* honeypot: hidden from humans, not from bots */
      .hp {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      button {
        padding: 12px 28px;
        background: var(--text);
        color: var(--bg);
        border: none;
        border-radius: 999px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover { background: var(--accent-dark); }
      button:disabled { opacity: 0.6; cursor: wait; }

      .row-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 24px; }
      .message { margin-top: 16px; font-size: 14px; min-height: 20px; }
      .message.success { color: var(--accent); font-weight: 500; }
      .message.error { color: var(--error); }

      .site-footer { padding: 48px 0 32px; border-top: 1px solid var(--divider); margin-top: 40px; }
      .footer-grid { display: flex; flex-direction: column; gap: 24px; }
      @media (min-width: 720px) {
        .footer-grid { flex-direction: row; justify-content: space-between; align-items: center; }
      }
      .footer-nav { display: flex; gap: 24px; }
      .footer-nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; }
      .footer-nav a:hover { color: var(--text); }
      .footer-copy { font-size: 13px; color: var(--text-muted); }

      @media (max-width: 720px) {
        main { padding: 24px 0 64px; }
        .card { padding: 24px; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a href="/" class="wordmark" aria-label="Nūtral home">Nūtral</a>
        <a href="/#join" class="nav-btn">Subscribe</a>
      </div>
    </header>

    <main>
      <div class="container">
        <article class="doc">
          <p class="eyebrow">Contact</p>
          <h1>Get in touch.</h1>
          <p class="lede">
            Questions, feedback, a topic you wish we covered? Send a note — a real person
            reads every one.
          </p>

          <div class="card">
            <form id="contact-form" novalidate>
              <div class="field">
                <label for="name">Your name</label>
                <input id="name" type="text" name="name" autocomplete="name" maxlength="120" required />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="your@email.com" autocomplete="email" maxlength="200" required />
              </div>
              <div class="field">
                <label for="message">Message</label>
                <textarea id="message" name="message" maxlength="5000" required></textarea>
              </div>

              <!-- honeypot -->
              <div class="hp" aria-hidden="true">
                <label for="company">Company</label>
                <input id="company" type="text" name="company" tabindex="-1" autocomplete="off" />
              </div>

              <div class="row-actions">
                <button type="submit" id="submit-btn">Send message</button>
              </div>
              <p class="message" id="contact-message" role="status" aria-live="polite"></p>
            </form>
          </div>
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <span class="wordmark">Nūtral</span>
        <nav class="footer-nav" aria-label="Footer">
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="/contact">Contact</a>
        </nav>
        <p class="footer-copy">© 2026 Nūtral</p>
      </div>
    </footer>

    <script>
      const form = document.getElementById("contact-form");
      const msg = document.getElementById("contact-message");
      const btn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.className = "message";
        msg.textContent = "";

        const name = form.name.value.trim();
        const email = form.email.value.trim();
        const message = form.message.value.trim();
        const company = form.company.value; // honeypot

        if (!name || !email || !message) {
          msg.className = "message error";
          msg.textContent = "Please fill in every field.";
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          msg.className = "message error";
          msg.textContent = "That doesn't look like a valid email address.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending…";

        try {
          const res = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message, company }),
          });
          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            throw new Error(data.error || "Something went wrong. Please try again.");
          }

          form.reset();
          msg.className = "message success";
          msg.textContent = "Thanks — your message is on its way. We'll reply to " + email + ".";
        } catch (err) {
          msg.className = "message error";
          msg.textContent = err.message || "Something went wrong. Please try again.";
        } finally {
          btn.disabled = false;
          btn.textContent = "Send message";
        }
      });
    </script>
  </body>
</html>
